<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الموارد البشرية الرقمية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>منصة الموارد البشرية الرقمية</h1>
        </header>
        
        <section class="card">
            <h2>تسجيل بيانات الموظف</h2>
            <form id="employeeForm">
                <input type="text" placeholder="الاسم واللقب" required>
                <input type="text" placeholder="المسمى الوظيفي">
                <button type="submit">تسجيل</button>
            </form>
        </section>

        <section class="card">
            <h2>نظام التوجيه الذكي</h2>
            <p>اختر الخدمة المطلوبة:</p>
            <div class="actions">
                <button onclick="alert('تم توجيه طلبك لمصلحة المستخدمين')">مصلحة المستخدمين</button>
                <button onclick="alert('تم توجيه طلبك لمصلحة الأجور')">مصلحة الأجور</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
